<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Jumper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        #loading h1 {
            font-size: 2.5rem;
            color: #ffda33;
            margin-bottom: 1rem;
        }

        #loading p {
            font-size: 1.1rem;
            color: #aab;
            margin-bottom: 1.5rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,218,51,0.2);
            border-top: 4px solid #ffda33;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <h1>Platform Jumper</h1>
            <p>Loading game...</p>
            <div class="spinner"></div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <script type="module">
        import init from './platform-jumper.js';

        async function run() {
            try {
                await init();
                document.getElementById('loading').classList.add('hidden');
            } catch (e) {
                console.error('Failed to start game:', e);
                document.querySelector('#loading p').textContent =
                    'Failed to load. Please refresh the page.';
                document.querySelector('.spinner').style.display = 'none';
            }
        }

        run();
    </script>
</body>
</html>
