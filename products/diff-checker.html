<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Checker - Compare Text Online Free</title>
<meta name="description" content="Free online diff checker. Compare two blocks of text side by side and instantly see additions, deletions, and changes highlighted.">
<meta name="keywords" content="diff checker, text compare, online diff, compare text, side by side diff, line diff">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Diff Checker - Compare Text Online Free">
<meta property="og:description" content="Compare two blocks of text side by side and instantly see additions, deletions, and changes.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230b1020'/><text x='4' y='22' font-size='18' font-family='monospace' fill='%2356c2ff'>+-</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0b1020;color:#eef3ff;font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,'Courier New',monospace;line-height:1.5;min-height:100vh}
.container{max-width:1280px;margin:0 auto;padding:24px 20px}
h1{font-size:1.5rem;font-weight:700;color:#56c2ff;margin-bottom:4px}
.subtitle{font-size:.85rem;color:#8899bb;margin-bottom:20px}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:rgba(13,19,37,.94);border:1px solid rgba(86,194,255,.15);border-radius:8px;padding:16px;display:flex;flex-direction:column}
.panel label{font-size:.8rem;font-weight:600;color:#56c2ff;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
textarea{width:100%;height:220px;background:rgba(0,0,0,.3);border:1px solid rgba(86,194,255,.12);border-radius:6px;color:#eef3ff;font-family:inherit;font-size:.85rem;padding:12px;resize:vertical;line-height:1.6;outline:none;transition:border-color .2s}
textarea:focus{border-color:#56c2ff}
textarea::placeholder{color:#556}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
button{background:rgba(86,194,255,.12);border:1px solid rgba(86,194,255,.25);color:#56c2ff;font-family:inherit;font-size:.8rem;font-weight:600;padding:8px 18px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
button:hover{background:rgba(86,194,255,.22);border-color:#56c2ff}
.btn-primary{background:#56c2ff;color:#0b1020;border-color:#56c2ff}
.btn-primary:hover{background:#7dd3ff}
.toggle{display:flex;align-items:center;gap:6px;font-size:.78rem;color:#8899bb;cursor:pointer;user-select:none}
.toggle input{accent-color:#56c2ff;width:15px;height:15px;cursor:pointer}
.stats{display:flex;gap:20px;margin-bottom:16px;font-size:.8rem;flex-wrap:wrap}
.stat{padding:6px 14px;border-radius:6px;background:rgba(13,19,37,.94);border:1px solid rgba(86,194,255,.1)}
.stat-added{color:#5ee7a0;border-color:rgba(94,231,160,.2)}
.stat-removed{color:#ff7b95;border-color:rgba(255,123,149,.2)}
.stat-unchanged{color:#8899bb}
.diff-container{background:rgba(13,19,37,.94);border:1px solid rgba(86,194,255,.15);border-radius:8px;overflow:hidden}
.diff-header{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(86,194,255,.1)}
.diff-header span{padding:10px 16px;font-size:.78rem;font-weight:600;color:#56c2ff;text-transform:uppercase;letter-spacing:.05em}
.diff-header span:first-child{border-right:1px solid rgba(86,194,255,.1)}
.diff-body{max-height:520px;overflow-y:auto}
.diff-row{display:grid;grid-template-columns:1fr 1fr;min-height:1.6em;border-bottom:1px solid rgba(86,194,255,.04)}
.diff-cell{display:flex;padding:1px 0;font-size:.82rem;overflow-x:auto;border-right:1px solid rgba(86,194,255,.06)}
.diff-cell:last-child{border-right:none}
.line-num{min-width:44px;text-align:right;padding:2px 8px 2px 4px;color:#445;user-select:none;flex-shrink:0;border-right:1px solid rgba(86,194,255,.06)}
.line-content{padding:2px 10px;white-space:pre;flex:1;min-width:0}
.diff-added .line-content{background:rgba(94,231,160,.1);color:#5ee7a0}
.diff-added .line-num{color:rgba(94,231,160,.4)}
.diff-removed .line-content{background:rgba(255,123,149,.1);color:#ff7b95}
.diff-removed .line-num{color:rgba(255,123,149,.4)}
.empty-state{text-align:center;padding:60px 20px;color:#445;font-size:.9rem}
.diff-body::-webkit-scrollbar{width:8px}
.diff-body::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}
.diff-body::-webkit-scrollbar-thumb{background:rgba(86,194,255,.18);border-radius:4px}
@media(max-width:700px){.input-grid,.diff-header,.diff-row{grid-template-columns:1fr}textarea{height:150px}.diff-header span:first-child{border-right:none;border-bottom:1px solid rgba(86,194,255,.1)}.diff-cell{border-right:none;border-bottom:1px solid rgba(86,194,255,.04)}}
</style>
</head>
<body>
<div class="container">
  <h1>Diff Checker</h1>
  <p class="subtitle">Compare two blocks of text and see the differences highlighted side by side.</p>

  <div class="input-grid">
    <div class="panel">
      <label for="original">Original</label>
      <textarea id="original" placeholder="Paste original text here..."></textarea>
    </div>
    <div class="panel">
      <label for="modified">Modified</label>
      <textarea id="modified" placeholder="Paste modified text here..."></textarea>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-primary" onclick="compare()">Compare</button>
    <button onclick="swapInputs()">Swap</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="loadSample()">Sample Data</button>
    <label class="toggle"><input type="checkbox" id="ignoreWs"> Ignore whitespace</label>
    <label class="toggle"><input type="checkbox" id="ignoreCase"> Ignore case</label>
  </div>

  <div id="stats" class="stats" style="display:none"></div>

  <div class="diff-container">
    <div class="diff-header">
      <span>Original</span>
      <span>Modified</span>
    </div>
    <div class="diff-body" id="diffBody">
      <div class="empty-state">Enter text in both fields and click <strong>Compare</strong> to see the diff.</div>
    </div>
  </div>
</div>

<script>
function normalizeLine(line, ignoreWs, ignoreCase) {
  let s = line;
  if (ignoreWs) s = s.replace(/\s+/g, ' ').trim();
  if (ignoreCase) s = s.toLowerCase();
  return s;
}

function lcs(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i - 1] === b[j - 1]
        ? dp[i - 1][j - 1] + 1
        : Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
  }
  const result = [];
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (a[i - 1] === b[j - 1]) {
      result.push({aIdx: i - 1, bIdx: j - 1});
      i--; j--;
    } else if (dp[i - 1][j] >= dp[i][j - 1]) {
      i--;
    } else {
      j--;
    }
  }
  return result.reverse();
}

function computeDiff(origLines, modLines, ignoreWs, ignoreCase) {
  const normOrig = origLines.map(l => normalizeLine(l, ignoreWs, ignoreCase));
  const normMod = modLines.map(l => normalizeLine(l, ignoreWs, ignoreCase));
  const matches = lcs(normOrig, normMod);
  const ops = [];
  let ai = 0, bi = 0;
  for (const m of matches) {
    while (ai < m.aIdx) { ops.push({type: 'removed', aLine: ai, aText: origLines[ai]}); ai++; }
    while (bi < m.bIdx) { ops.push({type: 'added', bLine: bi, bText: modLines[bi]}); bi++; }
    ops.push({type: 'equal', aLine: ai, bLine: bi, aText: origLines[ai], bText: modLines[bi]});
    ai++; bi++;
  }
  while (ai < origLines.length) { ops.push({type: 'removed', aLine: ai, aText: origLines[ai]}); ai++; }
  while (bi < modLines.length) { ops.push({type: 'added', bLine: bi, bText: modLines[bi]}); bi++; }
  return ops;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function compare() {
  const origText = document.getElementById('original').value;
  const modText = document.getElementById('modified').value;
  const ignoreWs = document.getElementById('ignoreWs').checked;
  const ignoreCase = document.getElementById('ignoreCase').checked;
  const origLines = origText.split('\n');
  const modLines = modText.split('\n');
  const ops = computeDiff(origLines, modLines, ignoreWs, ignoreCase);

  let added = 0, removed = 0, unchanged = 0;
  const rows = [];

  for (const op of ops) {
    if (op.type === 'equal') {
      unchanged++;
      rows.push(`<div class="diff-row"><div class="diff-cell"><span class="line-num">${op.aLine+1}</span><span class="line-content">${esc(op.aText)}</span></div><div class="diff-cell"><span class="line-num">${op.bLine+1}</span><span class="line-content">${esc(op.bText)}</span></div></div>`);
    } else if (op.type === 'removed') {
      removed++;
      rows.push(`<div class="diff-row"><div class="diff-cell diff-removed"><span class="line-num">${op.aLine+1}</span><span class="line-content">${esc(op.aText)}</span></div><div class="diff-cell"><span class="line-num"></span><span class="line-content"></span></div></div>`);
    } else {
      added++;
      rows.push(`<div class="diff-row"><div class="diff-cell"><span class="line-num"></span><span class="line-content"></span></div><div class="diff-cell diff-added"><span class="line-num">${op.bLine+1}</span><span class="line-content">${esc(op.bText)}</span></div></div>`);
    }
  }

  document.getElementById('diffBody').innerHTML = rows.length
    ? rows.join('')
    : '<div class="empty-state">No differences found. The texts are identical.</div>';

  const statsEl = document.getElementById('stats');
  statsEl.style.display = 'flex';
  statsEl.innerHTML = `<span class="stat stat-added">+${added} added</span><span class="stat stat-removed">-${removed} removed</span><span class="stat stat-unchanged">${unchanged} unchanged</span>`;
}

function swapInputs() {
  const o = document.getElementById('original');
  const m = document.getElementById('modified');
  const tmp = o.value;
  o.value = m.value;
  m.value = tmp;
}

function clearAll() {
  document.getElementById('original').value = '';
  document.getElementById('modified').value = '';
  document.getElementById('diffBody').innerHTML = '<div class="empty-state">Enter text in both fields and click <strong>Compare</strong> to see the diff.</div>';
  document.getElementById('stats').style.display = 'none';
}

function loadSample() {
  document.getElementById('original').value = `function greet(name) {
  console.log("Hello, " + name);
  return true;
}

const users = ["Alice", "Bob"];
for (let i = 0; i < users.length; i++) {
  greet(users[i]);
}`;
  document.getElementById('modified').value = `function greet(name, greeting = "Hello") {
  console.log(greeting + ", " + name);
  return true;
}

const users = ["Alice", "Bob", "Charlie"];
for (const user of users) {
  greet(user);
}

console.log("Done!");`;
  compare();
}
</script>
</body>
</html>
