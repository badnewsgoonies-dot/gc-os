<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Image Compressor - Compress JPEG & PNG Images Online Free</title>
<meta name="description" content="Free online image compressor. Compress JPEG and PNG images instantly in your browser. Adjust quality, resize dimensions, batch compress multiple files. No upload required.">
<meta name="keywords" content="image compressor, compress jpeg, compress png, reduce image size, batch compress, online tool, image optimizer, resize image">
<meta name="robots" content="index,follow">
<meta property="og:title" content="Image Compressor - Compress JPEG & PNG Images Online Free">
<meta property="og:description" content="Free online image compressor. Compress JPEG and PNG images instantly in your browser with adjustable quality and resize options.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='12' width='100' height='100' fill='%230b1020'/><text x='50' y='68' font-size='38' font-family='system-ui' font-weight='bold' text-anchor='middle' fill='%2356c2ff'>&#x1F5DC;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1020;color:#eef3ff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.3rem;padding:1.2rem 0 .3rem;color:#56c2ff;text-align:center;letter-spacing:.5px}
.sub{font-size:.75rem;color:#6a7a9b;text-align:center;margin-bottom:1rem}
.wrap{width:100%;max-width:960px;padding:0 1rem 1rem;flex:1;display:flex;flex-direction:column;gap:.8rem}
.panel{background:rgba(13,19,37,.94);border:1px solid #1a2340;border-radius:8px;overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:.5rem .7rem;border-bottom:1px solid #1a2340;font-size:.75rem;color:#6a7a9b;flex-wrap:wrap;gap:.4rem}
.panel-head strong{color:#56c2ff;font-size:.8rem}
button{background:rgba(86,194,255,.12);color:#56c2ff;border:1px solid rgba(86,194,255,.25);border-radius:6px;padding:.35rem .7rem;font-family:inherit;font-size:.72rem;cursor:pointer;transition:all .15s;white-space:nowrap}
button:hover{background:rgba(86,194,255,.22);border-color:#56c2ff}
button:disabled{opacity:.35;cursor:not-allowed}
button.primary{background:rgba(86,194,255,.2);font-size:.78rem;padding:.45rem 1rem}
.drop-zone{border:2px dashed #1a2340;border-radius:8px;padding:2.5rem 1rem;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.over{border-color:#56c2ff;background:rgba(86,194,255,.04)}
.drop-zone .icon{font-size:2rem;margin-bottom:.5rem;opacity:.6}
.drop-zone p{color:#6a7a9b;font-size:.8rem}
.drop-zone p span{color:#56c2ff;text-decoration:underline;cursor:pointer}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.controls{display:flex;flex-wrap:wrap;align-items:center;gap:.8rem;padding:.6rem .7rem}
.control-group{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:#6a7a9b}
.control-group label{white-space:nowrap}
.control-group input[type=range]{accent-color:#56c2ff;width:120px;cursor:pointer}
.control-group input[type=number]{background:rgba(13,19,37,.94);border:1px solid #1a2340;border-radius:5px;color:#eef3ff;font-family:inherit;font-size:.72rem;padding:.25rem .4rem;width:65px;outline:none;text-align:center}
.control-group input[type=number]:focus{border-color:#56c2ff}
.control-group select{background:rgba(13,19,37,.94);border:1px solid #1a2340;border-radius:5px;color:#eef3ff;font-family:inherit;font-size:.72rem;padding:.25rem .4rem;outline:none;cursor:pointer}
.control-group select:focus{border-color:#56c2ff}
.val{color:#56c2ff;font-weight:600;min-width:28px;text-align:center}
.batch-list{max-height:360px;overflow-y:auto}
.batch-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border-bottom:1px solid #1a2340;font-size:.72rem;transition:background .15s}
.batch-item:last-child{border-bottom:none}
.batch-item:hover{background:rgba(86,194,255,.03)}
.batch-item .thumb{width:42px;height:42px;border-radius:4px;object-fit:cover;background:#1a2340;flex-shrink:0}
.batch-item .info{flex:1;min-width:0}
.batch-item .name{color:#eef3ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.15rem}
.batch-item .meta{color:#6a7a9b;font-size:.65rem}
.batch-item .meta .saved{color:#4ade80}
.batch-item .meta .bigger{color:#ff6b8a}
.batch-item .actions{display:flex;gap:.3rem;flex-shrink:0}
.batch-item .status-icon{font-size:.85rem;flex-shrink:0}
.preview-area{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#1a2340;min-height:200px}
.preview-side{background:rgba(13,19,37,.94);display:flex;flex-direction:column;align-items:center;padding:.6rem}
.preview-side .label{font-size:.65rem;color:#6a7a9b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
.preview-side .size{font-size:.8rem;color:#56c2ff;font-weight:600;margin-bottom:.4rem}
.preview-side img{max-width:100%;max-height:260px;border-radius:4px;object-fit:contain;background:repeating-conic-gradient(#1a2340 0% 25%,#0b1020 0% 50%) 50%/16px 16px}
.summary{display:flex;gap:1rem;padding:.5rem .7rem;font-size:.72rem;color:#6a7a9b;justify-content:center;flex-wrap:wrap}
.summary .stat{text-align:center}
.summary .stat .num{color:#56c2ff;font-size:1rem;font-weight:700}
.summary .stat .num.green{color:#4ade80}
.empty-state{padding:2rem;text-align:center;color:#3a4a6b;font-size:.8rem}
.bar{height:3px;background:#1a2340;border-radius:2px;overflow:hidden;margin:.2rem 0}
.bar .fill{height:100%;background:#56c2ff;border-radius:2px;transition:width .3s}
footer{font-size:.65rem;color:#3a4a6b;padding:.8rem 0;text-align:center}
.batch-actions{display:flex;gap:.4rem;padding:.5rem .7rem;border-top:1px solid #1a2340;justify-content:flex-end}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a2340;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a3355}
@media(max-width:600px){
 .preview-area{grid-template-columns:1fr}
 .controls{gap:.5rem}
 .control-group input[type=range]{width:80px}
 .summary{gap:.5rem}
}
</style>
</head>
<body>
<h1>Image Compressor</h1>
<p class="sub">Compress JPEG &amp; PNG images in your browser &mdash; nothing leaves your device</p>
<div class="wrap">

<div class="drop-zone" id="dropZone">
 <div class="icon">&#128444;</div>
 <p>Drop images here or <span>browse files</span></p>
 <p style="margin-top:.3rem;font-size:.65rem;color:#3a4a6b">JPEG, PNG &bull; Multiple files supported</p>
 <input type="file" id="fileInput" accept="image/jpeg,image/png" multiple>
</div>

<div class="panel">
 <div class="panel-head"><strong>Settings</strong></div>
 <div class="controls">
  <div class="control-group">
   <label>Quality</label>
   <input type="range" id="quality" min="1" max="100" value="80">
   <span class="val" id="qualityVal">80</span>
  </div>
  <div class="control-group">
   <label>Format</label>
   <select id="outputFormat">
    <option value="auto">Auto</option>
    <option value="image/jpeg">JPEG</option>
    <option value="image/png">PNG</option>
   </select>
  </div>
  <div class="control-group">
   <label>Max W</label>
   <input type="number" id="maxWidth" placeholder="none" min="1" max="9999">
  </div>
  <div class="control-group">
   <label>Max H</label>
   <input type="number" id="maxHeight" placeholder="none" min="1" max="9999">
  </div>
  <button id="recompressBtn" disabled>Re-compress All</button>
 </div>
</div>

<div class="panel" id="previewPanel" style="display:none">
 <div class="panel-head"><strong>Preview</strong><span id="previewName"></span></div>
 <div class="preview-area">
  <div class="preview-side">
   <div class="label">Original</div>
   <div class="size" id="origSize">-</div>
   <img id="origImg" alt="Original">
  </div>
  <div class="preview-side">
   <div class="label">Compressed</div>
   <div class="size" id="compSize">-</div>
   <img id="compImg" alt="Compressed">
  </div>
 </div>
 <div class="summary" id="previewSummary"></div>
</div>

<div class="panel" id="batchPanel" style="display:none">
 <div class="panel-head"><strong>Files</strong><span id="batchCount"></span></div>
 <div class="batch-list" id="batchList"></div>
 <div class="batch-actions">
  <button id="clearBtn">Clear All</button>
  <button id="downloadAllBtn" class="primary" disabled>Download All</button>
 </div>
</div>

</div>
<footer>Runs entirely in your browser &mdash; images never leave your device</footer>

<script>
(()=>{
const $=s=>document.getElementById(s);
const dropZone=$('dropZone'),fileInput=$('fileInput'),qualitySlider=$('quality'),qualityVal=$('qualityVal');
const maxWInput=$('maxWidth'),maxHInput=$('maxHeight'),outputFmt=$('outputFormat');
const batchPanel=$('batchPanel'),batchList=$('batchList'),batchCount=$('batchCount');
const previewPanel=$('previewPanel'),origImg=$('origImg'),compImg=$('compImg');
const origSize=$('origSize'),compSize=$('compSize'),previewName=$('previewName'),previewSummary=$('previewSummary');
const recompressBtn=$('recompressBtn'),downloadAllBtn=$('downloadAllBtn'),clearBtn=$('clearBtn');

let items=[];
let selectedIdx=-1;

function fmtSize(b){
 if(b<1024)return b+' B';
 if(b<1048576)return(b/1024).toFixed(1)+' KB';
 return(b/1048576).toFixed(2)+' MB';
}

function pct(a,b){return((1-b/a)*100).toFixed(1)}

function getMime(file){
 const fmt=outputFmt.value;
 if(fmt!=='auto')return fmt;
 return file.type==='image/png'?'image/png':'image/jpeg';
}

function getExt(mime){return mime==='image/png'?'.png':'.jpg'}

function compress(file){
 return new Promise((resolve,reject)=>{
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
   URL.revokeObjectURL(url);
   let w=img.naturalWidth,h=img.naturalHeight;
   const mw=parseInt(maxWInput.value)||0;
   const mh=parseInt(maxHInput.value)||0;
   if(mw&&w>mw){const r=mw/w;w=mw;h=Math.round(h*r)}
   if(mh&&h>mh){const r=mh/h;h=mh;w=Math.round(w*r)}
   const c=document.createElement('canvas');
   c.width=w;c.height=h;
   const ctx=c.getContext('2d');
   ctx.drawImage(img,0,0,w,h);
   const mime=getMime(file);
   const q=qualitySlider.value/100;
   c.toBlob(blob=>{
    if(!blob)return reject(new Error('Compression failed'));
    resolve({blob,width:w,height:h,mime,origUrl:URL.createObjectURL(file),compUrl:URL.createObjectURL(blob)});
   },mime,q);
  };
  img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Failed to load image'))};
  img.src=url;
 });
}

async function processFiles(files){
 const valid=[...files].filter(f=>f.type==='image/jpeg'||f.type==='image/png');
 if(!valid.length)return;
 batchPanel.style.display='';
 recompressBtn.disabled=false;

 for(const file of valid){
  const idx=items.length;
  const item={file,origSize:file.size,name:file.name,status:'processing',result:null};
  items.push(item);
  renderList();
  try{
   item.result=await compress(file);
   item.compSize=item.result.blob.size;
   item.status='done';
  }catch(e){
   item.status='error';item.error=e.message;
  }
  renderList();
  if(selectedIdx===-1&&item.status==='done'){selectItem(idx)}
 }
 updateDownloadAll();
}

function renderList(){
 batchCount.textContent=items.length+' file'+(items.length!==1?'s':'');
 batchList.innerHTML='';
 items.forEach((item,i)=>{
  const row=document.createElement('div');
  row.className='batch-item'+(i===selectedIdx?' style="background:rgba(86,194,255,.06)"':'');
  if(i===selectedIdx)row.style.background='rgba(86,194,255,.06)';
  const thumbUrl=item.result?item.result.compUrl:'';
  const statusIcon=item.status==='processing'?'&#9203;':item.status==='done'?'&#10003;':'&#10007;';
  const statusColor=item.status==='done'?'#4ade80':item.status==='error'?'#ff6b8a':'#56c2ff';
  let metaHtml='';
  if(item.status==='done'){
   const saved=item.origSize-item.compSize;
   const cls=saved>=0?'saved':'bigger';
   metaHtml=`${fmtSize(item.origSize)} → ${fmtSize(item.compSize)} <span class="${cls}">(${saved>=0?'-':'+'}${Math.abs(parseFloat(pct(item.origSize,item.compSize)))}%)</span>`;
  }else if(item.status==='error'){
   metaHtml=`<span class="bigger">${item.error}</span>`;
  }else{
   metaHtml='Compressing...';
  }
  row.innerHTML=`
   <span class="status-icon" style="color:${statusColor}">${statusIcon}</span>
   ${thumbUrl?`<img class="thumb" src="${thumbUrl}" alt="">`:'<div class="thumb"></div>'}
   <div class="info"><div class="name">${item.name}</div><div class="meta">${metaHtml}</div></div>
   <div class="actions">
    ${item.status==='done'?`<button data-dl="${i}">Save</button>`:''}
    <button data-rm="${i}" style="color:#ff6b8a;border-color:rgba(255,107,138,.25);background:rgba(255,107,138,.08)">&#10005;</button>
   </div>`;
  row.addEventListener('click',e=>{
   if(e.target.closest('[data-dl]')){downloadItem(i);return}
   if(e.target.closest('[data-rm]')){removeItem(i);return}
   if(item.status==='done')selectItem(i);
  });
  batchList.appendChild(row);
 });
}

function selectItem(i){
 selectedIdx=i;
 const item=items[i];
 if(!item||!item.result)return;
 previewPanel.style.display='';
 previewName.textContent=item.name;
 origImg.src=item.result.origUrl;
 compImg.src=item.result.compUrl;
 origSize.textContent=fmtSize(item.origSize);
 compSize.textContent=fmtSize(item.compSize);
 const saved=item.origSize-item.compSize;
 const ratio=pct(item.origSize,item.compSize);
 previewSummary.innerHTML=`
  <div class="stat"><div class="num">${item.result.width}×${item.result.height}</div>Dimensions</div>
  <div class="stat"><div class="num${saved>=0?' green':''}">${saved>=0?'-':'+'}${Math.abs(parseFloat(ratio))}%</div>Savings</div>
  <div class="stat"><div class="num${saved>=0?' green':''}">${fmtSize(Math.abs(saved))}</div>${saved>=0?'Saved':'Larger'}</div>
  <div class="stat"><div class="num">${(item.compSize/item.origSize).toFixed(2)}x</div>Ratio</div>`;
 renderList();
}

function downloadItem(i){
 const item=items[i];
 if(!item||!item.result)return;
 const a=document.createElement('a');
 const ext=getExt(item.result.mime);
 const base=item.name.replace(/\.[^.]+$/,'');
 a.href=item.result.compUrl;
 a.download=base+'-compressed'+ext;
 a.click();
}

function removeItem(i){
 if(items[i]&&items[i].result){
  URL.revokeObjectURL(items[i].result.origUrl);
  URL.revokeObjectURL(items[i].result.compUrl);
 }
 items.splice(i,1);
 if(selectedIdx===i){selectedIdx=-1;previewPanel.style.display='none'}
 else if(selectedIdx>i)selectedIdx--;
 renderList();
 updateDownloadAll();
 if(!items.length){batchPanel.style.display='none';recompressBtn.disabled=true}
}

function updateDownloadAll(){
 downloadAllBtn.disabled=!items.some(it=>it.status==='done');
}

async function recompressAll(){
 for(let i=0;i<items.length;i++){
  const item=items[i];
  if(item.result){URL.revokeObjectURL(item.result.origUrl);URL.revokeObjectURL(item.result.compUrl)}
  item.status='processing';item.result=null;
  renderList();
  try{
   item.result=await compress(item.file);
   item.compSize=item.result.blob.size;
   item.status='done';
  }catch(e){item.status='error';item.error=e.message}
  renderList();
 }
 if(selectedIdx>=0&&items[selectedIdx]&&items[selectedIdx].status==='done')selectItem(selectedIdx);
 updateDownloadAll();
}

async function downloadAll(){
 for(let i=0;i<items.length;i++){
  if(items[i].status==='done')downloadItem(i);
 }
}

qualitySlider.addEventListener('input',()=>{qualityVal.textContent=qualitySlider.value});
recompressBtn.addEventListener('click',recompressAll);
downloadAllBtn.addEventListener('click',downloadAll);
clearBtn.addEventListener('click',()=>{
 items.forEach(it=>{if(it.result){URL.revokeObjectURL(it.result.origUrl);URL.revokeObjectURL(it.result.compUrl)}});
 items=[];selectedIdx=-1;
 batchPanel.style.display='none';previewPanel.style.display='none';
 recompressBtn.disabled=true;renderList();
});

fileInput.addEventListener('change',e=>{if(e.target.files.length)processFiles(e.target.files);fileInput.value=''});
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('over');if(e.dataTransfer.files.length)processFiles(e.dataTransfer.files)});
})();
</script>
</body>
</html>
