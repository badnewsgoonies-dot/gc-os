<body>
<header>
<svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="6" fill="rgba(86,194,255,.12)"/><text x="16" y="22" font-size="18" font-family="monospace" font-weight="bold" fill="#56c2ff" text-anchor="middle">{}</text></svg>
<h1>CSS Minifier</h1>

</header>

<div class="toolbar">
<button class="btn btn-primary" onclick="minify()" title="Minify CSS">Minify</button>
<button class="btn" onclick="beautify()" title="Beautify CSS">Beautify</button>

<button class="btn" onclick="clearAll()" title="Clear both panels">Clear</button>
<button class="btn" onclick="loadSample()" title="Load sample CSS">Sample</button>
<label class="btn" style="margin:0" title="Upload a CSS file">Upload<input type="file" accept=".css,text/css" hidden onchange="handleFile(event)"></label>
<div class="sep"></div>
<label class="toggle"><input type="checkbox" id="optComments" checked>Remove comments</label>
<label class="toggle"><input type="checkbox" id="optWhitespace" checked>Remove whitespace</label>
<label class="toggle"><input type="checkbox" id="optMerge">Merge selectors</label>
</div>

<div class="panels">
<div class="panel" id="inputPanel">
<div class="panel-head"><strong>Input CSS</strong><span id="inputSize">0 B</span></div>
<textarea id="input" placeholder="Paste your CSS here or drag & drop a .css file..." spellcheck="false" oninput="updateStats()"></textarea>
<div class="drop-overlay">Drop CSS file here</div>
</div>
<div class="panel">
<div class="panel-head"><strong>Output CSS</strong><span id="outputSize">0 B</span></div>
<textarea id="output" placeholder="Minified or beautified CSS will appear here..." spellcheck="false" readonly></textarea>
</div>
</div>

<div class="stats">
<span>Original: <b id="statOrig">0 B</b></span>
<span>Output: <b id="statOut">0 B</b></span>
<span>Savings: <b id="statSave">0%</b></span>
</div>

<div class="toast" id="toast"></div>

<script>
const $=s=>document.getElementById(s);
const inputEl=$('input'),outputEl=$('output');

function fmtSize(b){
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  return(b/1048576).toFixed(2)+' MB';
}

function updateStats(){
  const ib=new Blob([inputEl.value]).size;
  const ob=new Blob([outputEl.value]).size;
  $('inputSize').textContent=fmtSize(ib);
  $('outputSize').textContent=fmtSize(ob);
  $('statOrig').textContent=fmtSize(ib);
  $('statOut').textContent=fmtSize(ob);
  const pct=ib>0?((1-ob/ib)*100):0;
  $('statSave').textContent=(pct>0?pct.toFixed(1):'0')+'%';
}

function minify(){
  let css=inputEl.value;
  if(!css.trim()){toast('Nothing to minify');return}
  const rmComments=$('optComments').checked;
  const rmWhitespace=$('optWhitespace').checked;
  const doMerge=$('optMerge').checked;

  if(rmComments){
    css=css.replace(/\/\*[\s\S]*?\*\//g,'');
  }
  if(rmWhitespace){
    css=css.replace(/\s*\n\s*/g,'');
    css=css.replace(/\s*{\s*/g,'{');
    css=css.replace(/\s*}\s*/g,'}');
    css=css.replace(/\s*;\s*/g,';');
    css=css.replace(/\s*:\s*/g,':');
    css=css.replace(/\s*,\s*/g,',');
    css=css.replace(/;}/g,'}');
    css=css.replace(/\s{2,}/g,' ');
    css=css.trim();
  }else{
    css=css.replace(/;(\s*})/g,'$1');
  }
  if(doMerge){
    css=mergeSelectors(css);
  }
  outputEl.value=css;
  updateStats();
  toast('Minified!');
}

function mergeSelectors(css){
  const map=new Map();
  const order=[];
  const re=/([^{}]+)\{([^{}]*)\}/g;
  let m;
  const atBlocks=[];
  let clean=css.replace(/@[^{]+\{[^{}]*(?:\{[^}]*\}[^{}]*)*\}/g,b=>{atBlocks.push(b);return'/*@BLOCK'+(atBlocks.length-1)+'*/'});
  while((m=re.exec(clean))!==null){
    const sel=m[1].trim();
    const body=m[2].trim();
    if(map.has(sel)){
      map.set(sel,map.get(sel)+';'+body);
    }else{
      map.set(sel,body);
      order.push(sel);
    }
  }
  let out=order.map(s=>s+'{'+map.get(s)+'}').join('');
  atBlocks.forEach((b,i)=>{out=out.replace('/*@BLOCK'+i+'*/',b)});
  return out;
}

function beautify(){
  let css=inputEl.value||outputEl.value;
  if(!css.trim()){toast('Nothing to beautify');return}
  css=css.replace(/\/\*[\s\S]*?\*\//g,m=>'/*PRESERVE'+btoa(m)+'*/');
  css=css.replace(/\s+/g,' ').trim();
  css=css.replace(/\s*{\s*/g,' {\n');
  css=css.replace(/\s*}\s*/g,'\n}\n\n');
  css=css.replace(/;\s*/g,';\n');
  let lines=css.split('\n');
  let depth=0;
  let result=[];
  for(let line of lines){
    let trimmed=line.trim();
    if(!trimmed)continue;
    if(trimmed==='}'){
      depth=Math.max(0,depth-1);
      result.push('  '.repeat(depth)+trimmed);
    }else if(trimmed.endsWith('{')){
      result.push('  '.repeat(depth)+trimmed);
      depth++;
    }else{
      result.push('  '.repeat(depth)+trimmed);
    }
  }
  let out=result.join('\n')+'\n';
  out=out.replace(/\/\*PRESERVE([A-Za-z0-9+/=]+)\*\//g,(_,b)=>{try{return atob(b)}catch{return''}});
  out=out.replace(/\n{3,}/g,'\n\n');
  outputEl.value=out.trim();
  updateStats();
  toast('Beautified!');
}

function copyOutput(){
  const text=outputEl.value;
  if(!text){toast('Nothing to copy');return}
  navigator.clipboard.writeText(text).then(()=>toast('Copied!')).catch(()=>{
    outputEl.select();document.execCommand('copy');toast('Copied!');
  });
}

function clearAll(){
  inputEl.value='';outputEl.value='';updateStats();toast('Cleared');
}

  inputEl.value=`/* === Base Reset & Typography === */

  updateStats();
  toast('Sample loaded');
}

function handleFile(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{inputEl.value=ev.target.result;updateStats();toast('File loaded');};
  reader.readAsText(file);
  e.target.value='';
}

function toast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1800);
}

// Drag and drop
const ip=$('inputPanel');
['dragenter','dragover'].forEach(ev=>ip.addEventListener(ev,e=>{e.preventDefault();ip.classList.add('dragover')}));
['dragleave','drop'].forEach(ev=>ip.addEventListener(ev,e=>{e.preventDefault();ip.classList.remove('dragover')}));
ip.addEventListener('drop',e=>{
  const file=e.dataTransfer.files[0];
  if(file){const r=new FileReader();r.onload=ev=>{inputEl.value=ev.target.result;updateStats();toast('File loaded')};r.readAsText(file)}
});

updateStats();
</script>
