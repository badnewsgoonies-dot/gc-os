<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lorem Ipsum Generator - Generate Placeholder Text Online</title>
<meta name="description" content="Generate lorem ipsum placeholder text in multiple styles: Classic, Hipster, Tech, and Office. Copy paragraphs, sentences, or words instantly.">
<meta name="keywords" content="lorem ipsum, placeholder text, dummy text, text generator, hipster ipsum, tech ipsum">
<meta property="og:title" content="Lorem Ipsum Generator - Generate Placeholder Text Online">
<meta property="og:description" content="Generate placeholder text in multiple styles. Classic, Hipster, Tech, and Office variants.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>&#x1F4DD;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1020;color:#eef3ff;font-family:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;min-height:100vh;padding:24px;line-height:1.6}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.5rem;color:#56c2ff;margin-bottom:4px;letter-spacing:-.5px}
.subtitle{color:#7a8baa;font-size:.8rem;margin-bottom:28px}
.panel{background:rgba(13,19,37,.94);border:1px solid rgba(86,194,255,.12);border-radius:10px;padding:22px;margin-bottom:18px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.row:last-child{margin-bottom:0}
label{font-size:.78rem;color:#7a8baa;display:block;margin-bottom:5px}
.field{flex:1;min-width:140px}
select,input[type=number]{width:100%;background:#0b1020;border:1px solid rgba(86,194,255,.2);border-radius:6px;color:#eef3ff;padding:8px 10px;font-family:inherit;font-size:.82rem;outline:none;transition:border .2s}
select:focus,input[type=number]:focus{border-color:#56c2ff}
input[type=range]{width:100%;accent-color:#56c2ff;cursor:pointer}
.toggle-row{display:flex;align-items:center;gap:10px;font-size:.8rem;color:#9aaccc}
.toggle{position:relative;width:38px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle span{position:absolute;inset:0;background:#1a2340;border-radius:10px;cursor:pointer;transition:.2s}
.toggle span::before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:#4a5a7a;border-radius:50%;transition:.2s}
.toggle input:checked+span{background:rgba(86,194,255,.25)}
.toggle input:checked+span::before{transform:translateX(18px);background:#56c2ff}
.btn-generate{width:100%;padding:11px;background:linear-gradient(135deg,#56c2ff,#3a8fd4);color:#0b1020;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s;letter-spacing:.3px}
.btn-generate:hover{opacity:.88}
.btn-generate:active{opacity:.75}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.stats{font-size:.75rem;color:#5a6e8a}
.stats b{color:#7a8baa}
.btn-copy{background:rgba(86,194,255,.12);color:#56c2ff;border:1px solid rgba(86,194,255,.2);border-radius:6px;padding:6px 14px;font-family:inherit;font-size:.78rem;cursor:pointer;transition:all .2s}
.btn-copy:hover{background:rgba(86,194,255,.22)}
.btn-copy.copied{background:rgba(80,200,120,.18);color:#50c878;border-color:rgba(80,200,120,.3)}
.output{background:#070d1a;border:1px solid rgba(86,194,255,.08);border-radius:8px;padding:18px;min-height:120px;max-height:480px;overflow-y:auto;font-size:.82rem;line-height:1.75;color:#c8d4e8;white-space:pre-wrap;word-wrap:break-word}
.output::-webkit-scrollbar{width:6px}
.output::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:3px}
.qty-display{font-size:.78rem;color:#56c2ff;min-width:28px;text-align:center}
@media(max-width:540px){body{padding:14px}.panel{padding:16px}}
</style>
</head>
<body>
<div class="container">
<h1>Lorem Ipsum Generator</h1>
<p class="subtitle">Generate placeholder text in multiple styles</p>

<div class="panel">
<div class="row">
<div class="field">
<label>Style</label>
<select id="style">
<option value="classic">Classic Lorem Ipsum</option>
<option value="hipster">Hipster Ipsum</option>
<option value="tech">Tech Ipsum</option>
<option value="office">Office Ipsum</option>
</select>
</div>
<div class="field">
<label>Unit</label>
<select id="unit">
<option value="paragraphs">Paragraphs</option>
<option value="sentences">Sentences</option>
<option value="words">Words</option>
</select>
</div>
</div>
<div class="row">
<div class="field" style="flex:3">
<label>Quantity</label>
<input type="range" id="qty" min="1" max="50" value="5">
</div>
<div class="qty-display" id="qtyVal">5</div>
<div class="field" style="flex:0;min-width:70px">
<label>&nbsp;</label>
<input type="number" id="qtyNum" min="1" max="50" value="5" style="width:70px">
</div>
</div>
<div class="row" style="gap:24px">
<label class="toggle-row">
<span class="toggle"><input type="checkbox" id="startClassic" checked><span></span></span>
Start with "Lorem ipsum..."
</label>
<label class="toggle-row">
<span class="toggle"><input type="checkbox" id="htmlTags"><span></span></span>
Wrap in &lt;p&gt; tags
</label>
</div>
<div class="row">
<button class="btn-generate" id="genBtn">Generate</button>
</div>
</div>

<div class="panel">
<div class="output-header">
<div class="stats" id="stats"><b>0</b> words &middot; <b>0</b> chars</div>
<button class="btn-copy" id="copyBtn">Copy</button>
</div>
<div class="output" id="output">Click "Generate" to create placeholder text.</div>
</div>
</div>

<script>
(function(){
const D={
classic:[
["Lorem ipsum dolor sit amet, consectetur adipiscing elit.","Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.","Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.","Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.","Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum."],
["Curabitur pretium tincidunt lacus, nec viverra arcu hendrerit at.","Praesent blandit laoreet nibh, sed pellentesque eros accumsan quis.","Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae.","Donec elit libero, sodales nec volutpat a, suscipit non turpis."],
["Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas.","Fusce dapibus, tellus ac cursus commodo, tortor mauris condimentum nibh.","Aliquam erat volutpat, sed dignissim lacus laoreet vitae.","Vivamus sagittis lacus vel augue laoreet rutrum faucibus dolor auctor.","Morbi leo risus, porta ac consectetur ac, vestibulum at eros.","Nulla vitae elit libero, a pharetra augue mollis interdum."]
],
hipster:[
["Craft beer vinyl cred, pork belly chambray yr selvage put a bird on it.","Bushwick letterpress fixie gastropub, tattooed stumptown twee hella aesthetic.","Artisan cold-pressed raw denim, shoreditch post-ironic chia kombucha vegan plaid.","Tote bag organic sriracha, banh mi bespoke gluten-free leggings heirloom."],
["Helvetica synth pitchfork, trust fund small batch dreamcatcher hammock gentrify.","Wayfarers biodiesel ethical, taxidermy keytar wolf moon meditation lomo.","Portland neutra distillery, activated charcoal banjo celiac intelligentsia umami.","Adaptogen poutine chambray, crucifix vaporwave kinfolk artisan four dollar toast."],
["Slow-carb brooklyn messenger bag, farm-to-table scenester gochujang enamel pin.","Pour-over direct trade helvetica, thundercats mixtape cornhole praxis butcher.","Literally palo santo migas, bitters la croix cray cold-pressed marfa.","Microdosing occupy flexitarian, godard DIY locavore heirloom air plant beard.","Pabst vexillologist tofu, skateboard health goth selfies knausgaard asymmetrical."]
],
tech:[
["Microservices orchestration deploys containerized workloads across distributed Kubernetes clusters with zero-downtime rolling updates.","The API gateway handles rate limiting, authentication tokens, and request routing through the reverse proxy mesh.","Cloud-native serverless functions process event-driven payloads with automatic horizontal pod autoscaling.","CI/CD pipelines validate pull requests against staging environments with automated integration test suites."],
["Infrastructure-as-code provisions immutable server images with declarative configuration management and drift detection.","The observability stack correlates distributed traces, structured logs, and time-series metrics across service boundaries.","Edge computing nodes cache static assets at CDN points of presence, reducing origin server latency.","WebSocket connections maintain bidirectional real-time data streams with heartbeat keepalive and exponential backoff."],
["The service mesh encrypts east-west traffic with mutual TLS while sidecar proxies handle circuit breaking.","Terraform modules compose reusable cloud resource definitions across multi-region availability zone deployments.","Container registries store versioned OCI-compliant images scanned for CVE vulnerabilities in base layer dependencies.","GitOps controllers reconcile desired cluster state from version-controlled manifests with automated remediation loops."]
],
office:[
["Let's circle back on the deliverables and align our stakeholders around the core value proposition going forward.","We need to synergize cross-functional teams to drive bandwidth and leverage our competitive advantage.","Taking this offline, we should drill down into the KPIs and establish clear ownership of action items.","The paradigm shift requires us to move the needle on key metrics while maintaining operational excellence."],
["Per my last email, the low-hanging fruit here is to right-size the org and streamline our go-to-market strategy.","We should ideate around scalable solutions that move the needle on our quarterly OKRs and north star metrics.","The strategic pivot requires buy-in from C-suite champions to greenlight the transformation roadmap.","Proactively socializing the deck will build consensus and create alignment across all business verticals."],
["This is a net-new opportunity to disrupt the space and capture mindshare with best-in-class thought leadership.","We need to right-size expectations, manage up effectively, and close the loop on outstanding deliverables.","Let's level-set on priorities, create a war room for blockers, and establish a single source of truth.","Leveraging our core competencies, we can unlock value and build a moat around sustainable competitive advantage."]
]
};

const $=id=>document.getElementById(id);
const qty=$('qty'),qtyNum=$('qtyNum'),qtyVal=$('qtyVal');
const style=$('style'),unit=$('unit');
const startClassic=$('startClassic'),htmlTags=$('htmlTags');
const output=$('output'),stats=$('stats'),copyBtn=$('copyBtn'),genBtn=$('genBtn');

qty.oninput=()=>{qtyNum.value=qty.value;qtyVal.textContent=qty.value};
qtyNum.oninput=()=>{let v=Math.max(1,Math.min(50,+qtyNum.value||1));qty.value=v;qtyVal.textContent=v};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getSentences(styleKey,count){
const pools=D[styleKey];
let out=[];
let usedFirst=false;
for(let i=0;i<count;i++){
if(i===0&&startClassic.checked&&styleKey==='classic'){
out.push(pools[0][0]);
usedFirst=true;
}else{
let s=pick(pick(pools));
if(usedFirst&&s===pools[0][0]){s=pick(pools[1])}
out.push(s);
}
}
return out;
}

function getWords(styleKey,count){
const all=D[styleKey].flat();
let words=[];
for(const s of all) words.push(...s.replace(/[.,;!?]/g,'').split(/\s+/));
let out=[];
if(startClassic.checked&&styleKey==='classic'){
const first='Lorem ipsum dolor sit amet consectetur adipiscing elit'.split(' ');
for(let i=0;i<Math.min(count,first.length);i++) out.push(first[i]);
}
while(out.length<count) out.push(words[Math.floor(Math.random()*words.length)]);
return out.slice(0,count);
}

function generate(){
const s=style.value,u=unit.value,n=Math.max(1,Math.min(50,+qty.value));
const wrap=htmlTags.checked;
let result='';

if(u==='words'){
const w=getWords(s,n);
result=wrap?'<p>'+w.join(' ')+'</p>':w.join(' ');
}else if(u==='sentences'){
const sents=getSentences(s,n);
result=wrap?'<p>'+sents.join(' ')+'</p>':sents.join(' ');
}else{
const paras=[];
for(let i=0;i<n;i++){
const count=4+Math.floor(Math.random()*3);
const sents=[];
const pools=D[s];
for(let j=0;j<count;j++){
if(i===0&&j===0&&startClassic.checked&&s==='classic'){
sents.push(pools[0][0]);
}else{
sents.push(pick(pick(pools)));
}
}
paras.push(sents.join(' '));
}
result=wrap?paras.map(p=>'<p>'+p+'</p>').join('\n\n'):paras.join('\n\n');
}

output.textContent=result;
const plainText=result.replace(/<\/?p>/g,'');
const wc=plainText.trim()?plainText.trim().split(/\s+/).length:0;
const cc=plainText.length;
stats.innerHTML='<b>'+wc+'</b> words &middot; <b>'+cc+'</b> chars';
}

genBtn.onclick=generate;

copyBtn.onclick=()=>{
const text=output.textContent;
if(!text)return;
navigator.clipboard.writeText(text).then(()=>{
copyBtn.textContent='Copied!';
copyBtn.classList.add('copied');
setTimeout(()=>{copyBtn.textContent='Copy';copyBtn.classList.remove('copied')},1500);
});
};

generate();
})();
</script>
</body>
</html>
